<!-- Google Fonts — Noto Sans JP for SVG infographics & Japanese text -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<!-- Google Search Console verification — replace XXXXX with actual code -->
<!-- <meta name="google-site-verification" content="XXXXX" /> -->

<!-- Google Analytics 4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-S0BE5F3Y5H"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-S0BE5F3Y5H');
</script>

<!-- noindex for utility pages (taxonomy, term, search, archives) to save crawl budget -->
{{- if or (eq .Kind "taxonomy") (eq .Kind "term") (eq .Layout "search") (eq .Layout "archives") }}
<meta name="robots" content="noindex, follow" />
{{- end }}

<!-- hreflang for multilingual SEO -->
{{- if .IsTranslated }}
{{- range .AllTranslations }}
<link rel="alternate" hreflang="{{ .Language.Lang }}" href="{{ .Permalink }}" />
{{- end }}
{{- end }}

<!-- Open Graph defaults -->
<meta property="og:site_name" content="Productivity Works" />
{{ if .IsHome }}<meta property="og:type" content="website" />{{ else }}<meta property="og:type" content="article" />{{ end }}

<!-- Structured data (JSON-LD) for rich snippets -->
{{ partial "structured-data.html" . }}

<!-- AdSense verification + ads -->
<meta name="google-adsense-account" content="ca-pub-4066014704395092">
{{ partial "adsense.html" . }}
