{{- /* WebSite schema for homepage (enables sitelinks search box) — PaperMod does not provide this */ -}}
{{- if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "Productivity Works",
  "url": "{{ site.BaseURL }}",
  "potentialAction": {
    "@type": "SearchAction",
    "target": "{{ site.BaseURL }}search/?q={search_term_string}",
    "query-input": "required name=search_term_string"
  }
}
</script>
{{- end }}
{{- /* Article + BreadcrumbList schemas are provided by PaperMod theme natively */ -}}
