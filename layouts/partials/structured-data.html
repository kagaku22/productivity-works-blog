{{- /* WebSite schema for homepage (enables sitelinks search box) */ -}}
{{- if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "Productivity Works",
  "url": {{ site.BaseURL | jsonify }},
  "potentialAction": {
    "@type": "SearchAction",
    "target": {{ printf "%ssearch/?q={search_term_string}" site.BaseURL | jsonify }},
    "query-input": "required name=search_term_string"
  }
}
</script>
{{- end }}

{{- /* Article JSON-LD structured data for rich snippets in Google Search */ -}}
{{- if .IsPage }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": {{ .Title | jsonify }},
  "description": {{ with .Description }}{{ . | jsonify }}{{ else }}{{ .Summary | plainify | truncate 160 | jsonify }}{{ end }},
  "url": {{ .Permalink | jsonify }},
  "datePublished": {{ .Date.Format "2006-01-02T15:04:05Z07:00" | jsonify }},
  "dateModified": {{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" | jsonify }},
  "author": {
    "@type": "Person",
    "name": {{ with .Params.author }}{{ . | jsonify }}{{ else }}"Productivity Works"{{ end }}
  },
  "publisher": {
    "@type": "Organization",
    "name": "Productivity Works",
    "url": "https://productivity-works.com/"
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": {{ .Permalink | jsonify }}
  }
  {{- with .Params.cover }}{{- with .image }},
  "image": {
    "@type": "ImageObject",
    "url": {{ printf "%s%s" "https://productivity-works.com" . | jsonify }}
  }
  {{- end }}{{- end }}
}
</script>
{{- end }}

{{- /* BreadcrumbList for navigation rich snippets */ -}}
{{- if .IsPage }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": {{ site.BaseURL | jsonify }}
    }
    {{- with .CurrentSection }},
    {
      "@type": "ListItem",
      "position": 2,
      "name": {{ .Title | jsonify }},
      "item": {{ .Permalink | jsonify }}
    }
    {{- end }},
    {
      "@type": "ListItem",
      "position": 3,
      "name": {{ .Title | jsonify }},
      "item": {{ .Permalink | jsonify }}
    }
  ]
}
</script>
{{- end }}
