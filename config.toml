# =============================================================================
# Productivity Works Blog — Hugo config.toml
# Hugo version: 0.120+  |  Theme: PaperMod
# =============================================================================

baseURL = "https://productivity-works.com/"
title = "Productivity Works"
theme = "PaperMod"
[pagination]
  pagerSize = 10
languageCode = "ja"
defaultContentLanguage = "ja"
defaultContentLanguageInSubdir = true
enableRobotsTXT = true
enableGitInfo = true
buildDrafts = false
buildFuture = false
buildExpired = false
summaryLength = 140

# =============================================================================
# Multilingual configuration
# =============================================================================
[languages]

  [languages.ja]
    languageName = "日本語"
    weight = 1
    title = "Productivity Works"
    contentDir = "content-ja"
    [languages.ja.params]
      description = "生産性・副業・AI活用の実践情報メディア"
      author = "Productivity Works編集部"

  [languages.en]
    languageName = "English"
    weight = 2
    title = "Productivity Works"
    contentDir = "content-en"
    [languages.en.params]
      description = "Practical guides on productivity, side income, and AI tools"
      author = "Productivity Works Editorial"

# =============================================================================
# Sitemap
# =============================================================================
[sitemap]
  changeFreq = "daily"
  filename = "sitemap.xml"
  priority = 0.5

# =============================================================================
# Taxonomy
# =============================================================================
[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

# =============================================================================
# Outputs
# =============================================================================
[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML"]
  term = ["HTML", "RSS"]

# =============================================================================
# Markup settings
# =============================================================================
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "monokai"
    lineNos = false
    codeFences = true

# =============================================================================
# PaperMod theme parameters
# =============================================================================
[params]
  env = "production"
  description = "生産性・副業・AI活用の実践情報メディア"
  author = "Productivity Works編集部"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  ShowFullTextInRSS = false
  disableThemeToggle = false
  disableScrollToTop = false
  comments = false

  [params.assets]
    favicon = "favicon.ico"
    favicon16x16 = "favicon-16x16.png"
    favicon32x32 = "favicon-32x32.png"
    apple_touch_icon = "apple-touch-icon.png"

  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false

  [params.homeInfoParams]
    Title = "Productivity Works"
    Content = "生産性向上・副業・AI活用の実践ノウハウを届けるメディアです。Practical guides on productivity, side income, and AI tools."

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    limit = 10
    keys = ["title", "permalink", "summary", "content"]

  [params.schema]
    publisherType = "Organization"

# =============================================================================
# Navigation menu (per-language)
# =============================================================================

  [[languages.ja.menu.main]]
    identifier = "categories"
    name = "カテゴリ"
    url = "categories/"
    weight = 10
  [[languages.ja.menu.main]]
    identifier = "tags"
    name = "タグ"
    url = "tags/"
    weight = 20
  [[languages.ja.menu.main]]
    identifier = "archives"
    name = "アーカイブ"
    url = "archives/"
    weight = 25
  [[languages.ja.menu.main]]
    identifier = "tools"
    name = "無料ツール"
    url = "tools/"
    weight = 28
  [[languages.ja.menu.main]]
    identifier = "search"
    name = "検索"
    url = "search/"
    weight = 30

  [[languages.en.menu.main]]
    identifier = "categories"
    name = "Categories"
    url = "categories/"
    weight = 10
  [[languages.en.menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "tags/"
    weight = 20
  [[languages.en.menu.main]]
    identifier = "archives"
    name = "Archives"
    url = "archives/"
    weight = 25
  [[languages.en.menu.main]]
    identifier = "tools"
    name = "Free Tools"
    url = "tools/"
    weight = 28
  [[languages.en.menu.main]]
    identifier = "search"
    name = "Search"
    url = "search/"
    weight = 30

# =============================================================================
# Minification — disable JS minification (inline scripts with template literals)
# =============================================================================
[minify]
  disableJS = true

# =============================================================================
# Privacy settings
# =============================================================================
[privacy]
  [privacy.googleAnalytics]
    anonymizeIP = true
    respectDoNotTrack = true
  [privacy.x]
    enableDNT = true
